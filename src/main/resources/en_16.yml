#If you want to use hex color
#Please use the following format
#$[FFFFFF]message
#Please note that hex color cannot be displayed in console
updateCheckFailure: 'В§6В§lVipSystemEx В§7>>> В§aUpdate checks failed, reason: {0}'
latestVersion: 'В§6В§lVipSystemEx В§7>>> В§aYou are running the latest version of VipSystemEx'
newUpdate: 'В§6В§lVipSystemEx В§7>>> В§aVipSystemEx {0} has released!'
fatalError: 'В§6В§lVipSystemEx В§7>>> В§cFatal error has occurred! Stop loading!'
permissionDeny: 'В§cYou do not have enough permission to do this'
consoleForbid: 'В§cYou cannot use the command in Console'
playerNotFound: 'В§cTarget player is not online!'
Command:
  format: 'В§7{0} $[FF69B4]{1}'
  me:
    desc: 'Get the Vip information of yourself'
    usage: '$[DC143C]/$[FF1493]v$[FFA500]i$[FFFF00]p$[3CB371]s$[4169E1]y$[4B0082]s $[66CCFF]me'
    #Do not add any space in usage!
    result: 'В§7You are В§e{0}В§7. Vip expires when В§e{1} В§7, В§e{2} В§7days left'
    resultPermanent: 'В§7You are permanent В§e{0}В§7.'
    noVip: 'В§cYou have no Vip!'
  give:
    desc: 'Give the player specific vip group with specific time, time in xdxhxmxs which refers to x days, x hours, x minutes, x seconds. -1 for permanent'
    usage: '$[DC143C]/$[FF1493]v$[FFA500]i$[FFFF00]p$[3CB371]s$[4169E1]y$[4B0082]s $[66CCFF]give [Player] [Group] [Time]'
    #Do not add any space in usage!
    alreadyHaveVip: 'В§7The player has already had a vip'
    success: 'В§7Vip successfully given'
    invalidTime: 'В§cTime is invalid. e.g. 1d2h3m4s for 1 day 2 hours 3 minutes and 4 seconds. -1 for permanent. Time should be larger than 60 seconds'
  remove:
    desc: 'Remove Vip of the player'
    usage: '$[DC143C]/$[FF1493]v$[FFA500]i$[FFFF00]p$[3CB371]s$[4169E1]y$[4B0082]s $[66CCFF]remove [Player]'
    #Do not add any space in usage!
    noVip: 'В§cThe player has no Vip!'
    success: 'В§7Vip successfully removed'
  changevip:
    desc: 'Change your activated vip group'
    usage: '$[DC143C]/$[FF1493]v$[FFA500]i$[FFFF00]p$[3CB371]s$[4169E1]y$[4B0082]s $[66CCFF]changevip'
    noVipStored: 'В§cYou have no vip in storage'
    vipStored: 'В§7Following are your vip in storage. Hover the entry to get more details'
    tellraw:
      plain: 'В§7- В§e{0}'
      extra:
        - 'В§7Time when stored: В§e{0}'
        - 'В§7Time when expire: В§e{1}'
        - 'В§bClick to change the Vip'
  reload:
    desc: 'Reload the plugin'
    usage: '$[DC143C]/$[FF1493]v$[FFA500]i$[FFFF00]p$[3CB371]s$[4169E1]y$[4B0082]s $[66CCFF]reload'
    #Do not add any space in usage!
    success: 'В§7Reload complete.'
  look:
    desc: 'Get the Vip information of the specific player'
    usage: '$[DC143C]/$[FF1493]v$[FFA500]i$[FFFF00]p$[3CB371]s$[4169E1]y$[4B0082]s $[66CCFF]look [Player]'
    #Do not add any space in usage!
    result: 'В§7{3} is В§e{0}В§7. Vip expires when В§e{1} В§7, В§e{2} В§7days left'
    resultPermanent: 'В§7{1} is permanent В§e{0}В§7.'
    noVip: 'В§c{0} has no Vip!'
  list:
    desc: 'List the vips'
    usage: '$[DC143C]/$[FF1493]v$[FFA500]i$[FFFF00]p$[3CB371]s$[4169E1]y$[4B0082]s $[66CCFF]list'
    #Do not add any space in usage!
    list: 'В§7Below are the vips(Player,Vip,Date To Expire,Time Left):'
    amount: 'В§7Total Vip amount: В§e{0}'
  customs:
    desc: 'List the custom functions'
    usage: '$[DC143C]/$[FF1493]v$[FFA500]i$[FFFF00]p$[3CB371]s$[4169E1]y$[4B0082]s $[66CCFF]customs'
    #Do not add any space in usage!
    list: 'В§7Below are the loaded custom functions'
  run:
    usage: '$[DC143C]/$[FF1493]v$[FFA500]i$[FFFF00]p$[3CB371]s$[4169E1]y$[4B0082]s $[66CCFF]run [Function] <Args>'
    notFound: 'Function not found'
  addtime:
    desc: 'Add time to the player existing vip'
    usage: '$[DC143C]/$[FF1493]v$[FFA500]i$[FFFF00]p$[3CB371]s$[4169E1]y$[4B0082]s $[66CCFF]addtime [Player] [Time]'
    noVip: 'В§cThe player has no Vip!'
    isPermanent: 'В§cCannot add time to a permanent Vip!'
    success: 'В§7Vip time successfully extended'